<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="description"
      content="João Salgueiro, Lisbon-based Software Engineer focused on React, TypeScript, Node.js, and reusable web interfaces."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>João Salgueiro | Software Engineer</title>
    <script>
      ;(() => {
        let stored

        try {
          stored = localStorage.getItem('theme')
        } catch {
          stored = null
        }

        const prefersLight =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: light)').matches
        const systemTheme = prefersLight ? 'light' : 'dark'
        const theme =
          stored === 'light' || stored === 'dark' ? stored : systemTheme

        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
